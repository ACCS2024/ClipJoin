name: Build & Release

# ──────────────────────────────────────────────────────────────
# 触发方式：
#   1. 手动触发 (Actions → Run workflow)
#      可选择递增类型：patch / minor / major
#   2. 推送到 master 分支时自动触发（默认递增补丁版本）
#      忽略纯文档变更，避免无意义的 release
# ──────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      bump:
        description: '版本递增类型'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch   # 1.0.0 → 1.0.1  （默认，bug 修复）
          - minor   # 1.0.0 → 1.1.0  （新功能）
          - major   # 1.0.0 → 2.0.0  （破坏性变更）
  push:
    branches:
      - master

# 防止多个 push 同时跑，排队串行执行，避免 tag 版本号冲突
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write   # 创建 tag 与 release 所需

jobs:
  release:
    name: Build and Publish Release
    runs-on: windows-latest

    steps:
      # ── 1. 检出完整 git 历史（用于读取所有 tag） ─────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. 安装 .NET 10 ───────────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ── 3. 自动计算下一个版本号 ──────────────────────────────
      # 读取仓库中所有 vX.Y.Z 格式的 tag，找到最大值后递增
      - name: Calculate Version
        id: version
        shell: pwsh
        run: |
          $tags = git tag --list 'v*' | Where-Object { $_ -match '^v\d+\.\d+\.\d+$' }
          if ($tags) {
            $latest = $tags |
              ForEach-Object { [System.Version]($_ -replace '^v', '') } |
              Sort-Object -Descending |
              Select-Object -First 1
          } else {
            # 仓库没有任何 tag 时，第一个 release 直接从 v1.0.0 开始
            $latest = [System.Version]'0.9.9'
          }

          Write-Host "Latest tag: v$latest"

          # workflow_dispatch 有 bump input；push 触发时默认 patch
          $bump = '${{ github.event.inputs.bump }}'
          if (-not $bump) { $bump = 'patch' }

          $major = $latest.Major
          $minor = $latest.Minor
          $patch = $latest.Build

          switch ($bump) {
            'major' { $major++; $minor = 0; $patch = 0 }
            'minor' { $minor++; $patch = 0 }
            default { $patch++ }
          }

          $newVersion = "$major.$minor.$patch"
          $newTag     = "v$newVersion"

          Write-Host "New version : $newVersion  (bump=$bump)"

          "version=$newVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$newTag"         | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # ── 4. 还原 NuGet 依赖 ────────────────────────────────────
      - name: Restore
        run: dotnet restore ClipJoin.csproj

      # ── 5. 发布：win-x64 自包含单文件，版本号注入程序集 ──────
      - name: Publish
        shell: pwsh
        run: |
          $ver = '${{ steps.version.outputs.version }}'
          $tag = '${{ steps.version.outputs.tag }}'
          dotnet publish ClipJoin.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=none `
            -p:Version=$ver `
            -p:AssemblyVersion=$ver `
            -p:FileVersion=$ver `
            -p:InformationalVersion=$tag `
            --output artifact/

      # ── 6. 打包 ZIP 并生成 SHA256 校验文件 ───────────────────
      - name: Package ZIP
        id: package
        shell: pwsh
        run: |
          $ver     = '${{ steps.version.outputs.version }}'
          $zipName = "ClipJoin-v$ver-win-x64.zip"

          # 排除 .pdb 调试符号，只保留运行时文件
          $items = Get-ChildItem artifact/ -Exclude '*.pdb' | Select-Object -ExpandProperty FullName
          Compress-Archive -Path $items -DestinationPath $zipName

          # 计算 SHA256 供用户校验
          $hash = (Get-FileHash $zipName -Algorithm SHA256).Hash
          "$hash  $zipName" | Out-File -Encoding utf8 SHA256SUMS.txt

          Write-Host "Packaged: $zipName"
          Write-Host "SHA256  : $hash"

          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # ── 7. 推送新版本 tag 到仓库 ─────────────────────────────
      - name: Create Git Tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      # ── 8. 创建 GitHub Release，附上 zip 和 sha256 ───────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "ClipJoin ${{ steps.version.outputs.tag }}"
          generate_release_notes: true   # 自动从 commit 生成 changelog
          files: |
            ${{ steps.package.outputs.zip_name }}
            SHA256SUMS.txt
          fail_on_unmatched_files: true
